# ============================================================
#   FindGame  |  config.yml
#   Server-side settings, visuals and rewards.
#   For all player-facing text, see: messages.yml
# ============================================================

# ------------------------------------------------------------
# GENERAL SETTINGS
# ------------------------------------------------------------
settings:
  # Prefix prepended to every plugin message.
  prefix: "{#DC143C}&l[FindGame] {#B0B0B0}"

  # Print extra debug output to console.
  debug: false

  # Lives a player starts each session with.
  max-lives: 3

  # Seconds players can observe NPCs before the hunt begins.
  # During this window players cannot attack and slowness is applied.
  observation-phase: 7

  # Restore player game-mode when playing / returning to lobby.
  gamemode-management: true
  gamemode-playing: ADVENTURE
  gamemode-lobby: SURVIVAL

# ------------------------------------------------------------
# VISUALS
# NPC villager skin variants shown during a round.
# Valid values: DESERT, JUNGLE, SWAMP, SNOW, TAIGA, PLAINS, SAVANNA
# ------------------------------------------------------------
visuals:
  villager-skins-enabled: true
  allowed-skins:
    - "DESERT"
    - "JUNGLE"
    - "SWAMP"
    - "SNOW"
    - "TAIGA"
    - "PLAINS"

# ------------------------------------------------------------
# REWARDS
# %player% is replaced with the winner's name.
# Commands are dispatched from console.
# ------------------------------------------------------------
rewards:
  # Commands executed on every win.
  win-commands:
    - "xp add %player% 5 levels"
    - "give %player% emerald 1"

  # Chance (0-100) to also run the bonus command.
  bonus-chance: 20
  bonus-command: "give %player% diamond 1"
