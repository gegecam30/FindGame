# --- Configuración Básica ---
-dontshrink
-dontoptimize
-allowaccessmodification

# --- PROTECCIÓN DE CLASES ---
# Mantener la clase principal
-keep public class com.findgame.FindGamePlugin { *; }

# Mantener los Managers y sus métodos (Vital para que funcionen las llamadas internas)
-keep class com.findgame.managers.** { *; }
-keep class com.findgame.utils.** { *; }
-keep class com.findgame.data.** { *; }
-keep class com.findgame.listeners.** { *; }
-keep class com.findgame.commands.** { *; }

# --- PROTECCIÓN DE EVENTOS ---
# Esto es lo que hacía que no funcionaran los clicks
-keepclassmembers class * {
    @org.bukkit.event.EventHandler *;
}

# Mantener atributos necesarios para reflexión y logs
-keepattributes *Annotation*,Signature,SourceFile,LineNumberTable

# --- SILENCIAR ERRORES ---
-dontwarn **
-ignorewarnings
-dontnote **